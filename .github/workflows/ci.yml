name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Compile check
        run: cargo check --locked --all-targets --all-features

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny check

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo-audit
        run: cargo audit --deny warnings

      - name: Install reuse
        run: |
          python3 -m pip install --user reuse==6.2.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run reuse lint
        run: reuse lint

      - name: Run unit tests
        run: cargo test --locked

  vigolium-scan:
    name: Vigolium security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VIGOLIUM_TARGET_URL: ${{ secrets.VIGOLIUM_TARGET_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vigolium
        run: npm install --global @vigolium/vigolium

      - name: Run Vigolium scan
        if: env.VIGOLIUM_TARGET_URL != ''
        run: vigolium scan -t "$VIGOLIUM_TARGET_URL" --strategy lite --format jsonl -o vigolium-results.jsonl

      - name: Upload Vigolium scan results
        if: env.VIGOLIUM_TARGET_URL != ''
        uses: actions/upload-artifact@v4
        with:
          name: vigolium-scan-results
          path: vigolium-results.jsonl
          retention-days: 7

      - name: Skip scan when VIGOLIUM_TARGET_URL is not configured
        if: env.VIGOLIUM_TARGET_URL == ''
        run: echo "Skipping Vigolium scan because VIGOLIUM_TARGET_URL secret is not configured."
